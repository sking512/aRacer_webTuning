<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro View Analysis Suite v17</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* ── WebTuning Design System ── */
        :root {
            --bg: #020617;
            --panel: #0f172a;
            --accent: #3b82f6;
            --text: #f8fafc;
            --highlight: #10b981;
            --dim: #94a3b8;
            --error: #ef4444;
            --border: #1e293b;
            --chart-grid: #1e293b;
        }

        /* 淺色主題 */
        body.light-theme {
            --bg: #f8fafc;
            --panel: #ffffff;
            --accent: #2563eb;
            --text: #0f172a;
            --highlight: #059669;
            --dim: #64748b;
            --error: #dc2626;
            --border: #e2e8f0;
            --chart-grid: #e2e8f0;
        }

        /* ── Global Scrollbar ── */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* ── Focus (Accessibility) ── */
        *:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
            border-radius: 4px;
        }

        /* ── Reduced Motion ── */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Fira Sans', 'Noto Sans TC', sans-serif; overflow: hidden; transition: background 0.3s, color 0.3s; }

        header { height: 56px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid var(--border); transition: background 0.3s; z-index: 1000; position: relative; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        
        .header-left { display: flex; align-items: center; gap: 10px; }
        .btn-menu { display: none; background: transparent; color: var(--text); border: none; cursor: pointer; padding: 4px; border-radius: 4px; }
        
        .meta-group { display: flex; gap: 15px; font-size: 11px; color: var(--dim); font-family: 'Fira Code', 'Consolas', monospace; }
        .meta-group b { color: var(--text); margin-left: 4px; }
        
        .header-controls { display: flex; gap: 10px; align-items: center; }
        .btn-theme { background: transparent; color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; transition: 0.2s; white-space: nowrap; }
        .btn-theme:hover { background: var(--border); }
        .btn-open { background: var(--accent); color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 13px; white-space: nowrap; }
        .btn-open:hover { filter: brightness(1.2); }

        .main-layout { display: flex; height: calc(100vh - 56px); overflow: hidden; position: relative; }
        
        /* 側邊欄與響應式設計 */
        .sidebar-container { display: flex; flex-shrink: 0; height: 100%; position: relative; z-index: 100; }
        .sidebar { width: 340px; min-width: 260px; max-width: 50vw; background: var(--panel); display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; transition: transform 0.3s ease, background 0.3s; }
        
        .resizer-x { width: 6px; cursor: col-resize; background: transparent; border-right: 1px solid var(--border); z-index: 10; transition: background 0.2s; }
        .resizer-x:hover, .resizer-x.active { background: var(--accent); }

        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .sidebar-header { padding: 12px; font-size: 11px; color: var(--dim); background: var(--bg); letter-spacing: 1px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; transition: background 0.3s; }
        
        .ch-row { padding: 8px 15px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; gap: 10px; border-left: 4px solid transparent; transition: background 0.2s; }
        .ch-row:hover { background: rgba(128, 128, 128, 0.1); }
        .ch-row.active { border-left-color: var(--accent); background: rgba(59, 130, 246, 0.05); }
        .ch-row.fault-row { background: rgba(239, 68, 68, 0.05); }
        
        .ch-info { flex: 1; overflow: hidden; pointer-events: none; display: flex; flex-direction: column; justify-content: center; }
        .ch-chn { font-size: 14px; color: var(--text); font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ch-eng { font-size: 10px; color: var(--dim); font-family: 'Fira Code', 'Consolas', monospace; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ch-val { font-weight: bold; font-family: 'Fira Code', 'Consolas', monospace; font-size: 15px; min-width: 60px; text-align: right; pointer-events: none; }
        
        /* 拖曳遮罩與圖表區 */
        #chart-container { flex: 1; overflow-y: auto; background: var(--bg); display: flex; flex-direction: column; position: relative; transition: background 0.3s; }
        
        #drop-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(59, 130, 246, 0.15); border: 3px dashed var(--accent); display: none; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: var(--accent); z-index: 1000; backdrop-filter: blur(3px); pointer-events: none; margin: 10px; border-radius: 12px; text-align: center; padding: 20px;}

        .chart-card { width: 100%; height: 260px; min-height: 150px; border-bottom: 1px solid var(--border); resize: vertical; overflow: hidden; position: relative; flex-shrink: 0; transition: height 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .chart-card::-webkit-resizer { background-color: var(--border); }
        
        /* 雙擊高度控制按鈕 */
        .chart-controls { position: absolute; top: 8px; right: 15px; z-index: 10; }
        .btn-chart-resize { background: rgba(0, 0, 0, 0.3); color: var(--dim); border: 1px solid var(--border); border-radius: 4px; cursor: ns-resize; font-size: 12px; padding: 2px 8px; transition: 0.2s; user-select: none; backdrop-filter: blur(2px); }
        .btn-chart-resize:hover { color: var(--text); background: rgba(0, 0, 0, 0.6); border-color: var(--dim); }
        
        #floating-tooltip { position: fixed; pointer-events: none; background: rgba(15, 23, 42, 0.95); border: 1px solid var(--border); padding: 10px; border-radius: 6px; font-size: 12px; z-index: 10000; display: none; backdrop-filter: blur(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.5); white-space: nowrap; color: #e2e8f0; }
        input[type="checkbox"] { transform: scale(1.2); accent-color: var(--accent); cursor: pointer; }

        /* 手機模式與觸控優化 */
        #mobile-mask { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; backdrop-filter: blur(2px); }
        
        @media (max-width: 768px) {
            .btn-menu { display: block; }
            .meta-group { display: none; } /* 手機隱藏頂部元數據省空間 */
            .sidebar-container { position: fixed; left: 0; top: 56px; bottom: 0; transform: translateX(-100%); z-index: 100; transition: transform 0.3s ease; }
            .sidebar-container.open { transform: translateX(0); }
            .sidebar { max-width: 80vw; width: 280px; }
            .resizer-x { display: none; } /* 手機關閉水平拖曳 */
            #mobile-mask.show { display: block; }
            .chart-card { height: 200px; } /* 手機預設圖表較矮 */
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <button class="btn-menu" id="menuToggle" aria-label="選單">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div style="width:36px;height:36px;background:#dc2626;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-style:italic;font-size:18px;box-shadow:0 4px 6px rgba(0,0,0,0.3);flex-shrink:0;" aria-hidden="true">Pro</div>
        <div style="font-weight:bold; font-size: 16px; white-space: nowrap;">Log <span style="color:var(--accent)">Viewer</span></div>
    </div>
    <div class="meta-group">
        <span>DATE:<b id="metaDate">--</b></span>
        <span>ID:<b id="metaID">--</b></span>
        <span>VER:<b id="metaVer">--</b></span>
    </div>
    <div class="header-controls">
        <button class="btn-theme" id="themeToggle" style="display:flex;align-items:center;gap:4px;">
            <svg id="themeIcon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <span id="themeLabel">淺色</span>
        </button>
        <label class="btn-open">開啟 LOG <input type="file" id="logInput" accept=".loga,.log" style="display:none"></label>
    </div>
</header>

<div class="main-layout">
    <div id="mobile-mask"></div>
    <div class="sidebar-container" id="sidebar-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span>CHANNELS</span>
                <span id="chartCount">0/8</span>
            </div>
            <div id="sidebarItems"></div>
        </aside>
        <div class="resizer-x" id="resizer-x"></div>
    </div>
    <main id="chart-container">
        <div id="drop-overlay">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 16V4m0 0L8 8m4-4l4 4M20 16v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2"/></svg>
            <span style="margin-left:8px;">將 LOG 檔案拖曳至此處進行分析</span>
        </div>
    </main>
</div>

<div id="floating-tooltip"></div>

<script>
    let db = {}, chConfig = [], activeCharts = ['RPM', 'TPS_Percent', 'AFR_WBO2_CAL'], timeAxis = [];
    let isSyncing = false, currentXRange = null, rafId = null;
    let savedHeights = {}; 
    let domCache = {}; // 效能優化：快取側邊欄數值的 DOM 元素
    const tooltip = document.getElementById('floating-tooltip');
    const chartContainer = document.getElementById('chart-container');
    const dropOverlay = document.getElementById('drop-overlay');
    const MAX_CHARTS = 8; 

    const SENSOR_WEIGHTS = { 'RPM': 900, 'TPS_Percent': 850, 'AFR_WBO2_CAL': 800, 'Cyl1_Eng_AP': 750, 'T_Eng': 700, 'V_Batt': 650 };

    // --- 主題切換邏輯 ---
    const themeIcon = document.getElementById('themeIcon');
    const themeLabel = document.getElementById('themeLabel');
    const sunSVG = `<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>`;
    const moonSVG = `<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>`;

    document.getElementById('themeToggle').addEventListener('click', () => {
        document.body.classList.toggle('light-theme');
        if (document.body.classList.contains('light-theme')) {
            themeIcon.innerHTML = moonSVG;
            themeLabel.textContent = '深色';
        } else {
            themeIcon.innerHTML = sunSVG;
            themeLabel.textContent = '淺色';
        }
        if (Object.keys(db).length > 0) rebuildAllCharts();
    });

    function getThemeColors() {
        const isLight = document.body.classList.contains('light-theme');
        return { bg: isLight ? '#f8fafc' : '#020617', grid: isLight ? '#e2e8f0' : '#1e293b', text: isLight ? '#64748b' : '#94a3b8' };
    }

    // --- 手機模式：側邊欄滑動控制 ---
    const sidebarContainer = document.getElementById('sidebar-container');
    const mobileMask = document.getElementById('mobile-mask');
    document.getElementById('menuToggle').addEventListener('click', () => toggleMobileSidebar());
    mobileMask.addEventListener('click', () => toggleMobileSidebar(false));

    function toggleMobileSidebar(forceState) {
        const isOpen = sidebarContainer.classList.contains('open');
        const newState = forceState !== undefined ? forceState : !isOpen;
        if (newState) {
            sidebarContainer.classList.add('open');
            mobileMask.classList.add('show');
        } else {
            sidebarContainer.classList.remove('open');
            mobileMask.classList.remove('show');
        }
    }

    // --- 拖曳上傳與按鈕上傳 ---
    chartContainer.addEventListener('dragover', (e) => { e.preventDefault(); dropOverlay.style.display = 'flex'; });
    chartContainer.addEventListener('dragleave', (e) => { e.preventDefault(); if (e.target === chartContainer || e.target === dropOverlay) dropOverlay.style.display = 'none'; });
    chartContainer.addEventListener('drop', async (e) => {
        e.preventDefault(); dropOverlay.style.display = 'none';
        const file = e.dataTransfer.files[0];
        if (file && (file.name.endsWith('.loga') || file.name.endsWith('.log'))) {
            const text = await file.text(); parseLoga(text);
        } else { alert("請上傳正確的檔案格式"); }
    });
    document.getElementById('logInput').addEventListener('change', async (e) => {
        const file = e.target.files[0]; if (!file) return;
        const text = await file.text(); parseLoga(text);
    });

    // --- 電腦版：側邊欄拖曳與高度監聽 ---
    const sidebar = document.getElementById('sidebar');
    const resizerX = document.getElementById('resizer-x');
    let isResizingX = false;

    resizerX.addEventListener('mousedown', () => { isResizingX = true; resizerX.classList.add('active'); document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none'; });
    document.addEventListener('mousemove', (e) => { if (!isResizingX) return; let newWidth = e.clientX; if (newWidth > 200 && newWidth < window.innerWidth * 0.5) sidebar.style.width = newWidth + 'px'; });
    document.addEventListener('mouseup', () => { if (isResizingX) { isResizingX = false; resizerX.classList.remove('active'); document.body.style.cursor = 'default'; document.body.style.userSelect = 'auto'; } });

    const sidebarObserver = new ResizeObserver(() => { activeCharts.forEach(id => { const el = document.getElementById(`chart-${id.replace(/[^a-zA-Z0-9]/g, '_')}`); if (el) Plotly.Plots.resize(el); }); });
    sidebarObserver.observe(sidebar);

    const chartHeightObserver = new ResizeObserver(entries => { 
        for (let entry of entries) {
            Plotly.Plots.resize(entry.target);
            const eng = entry.target.id.replace('chart-', '');
            savedHeights[eng] = entry.target.style.height;
        }
    });

    // --- 數據解析 (P碼偵測與權重) ---
    function parseLoga(text) {
        const lines = text.split('\n');
        if(lines.length < 7) return;

        document.getElementById('metaDate').innerText = (lines.find(l => l.includes('Created Date:')) || '').split(': ')[1] || '--';
        document.getElementById('metaID').innerText = (lines.find(l => l.includes('Product ID:')) || '').split(': ')[1] || '--';
        document.getElementById('metaVer').innerText = (lines.find(l => l.includes('AMP Version:')) || '').split(': ')[1] || '--';

        const categories = lines[4].split(',');
        const headers = lines[5].split(',');
        
        db = {};
        chConfig = headers.map((h, i) => {
            const [eng, chn] = h.trim().split('/');
            const category = categories[i] ? categories[i].trim() : 'Other';
            db[eng] = [];
            return { eng, chn: chn || eng, category, weight: 100, isFault: false, triggered: false };
        });

        lines.slice(6).forEach(row => {
            const v = row.split(',');
            if (v.length < chConfig.length) return;
            chConfig.forEach((c, i) => db[c.eng].push(parseFloat(v[i]) || 0));
        });

        const baseTime = db['Time'][0];
        timeAxis = db['Time'].map(t => (t - baseTime) / 1000);
        currentXRange = [timeAxis[0], timeAxis[timeAxis.length - 1]];

        chConfig.forEach(c => {
            if (c.category === 'Flag' || /^P\d+/.test(c.eng)) {
                c.isFault = true;
                c.triggered = db[c.eng].some(v => v >= 1);
                c.weight = c.triggered ? 1000 : -1; 
                if (c.triggered && !activeCharts.includes(c.eng) && activeCharts.length < MAX_CHARTS) activeCharts.push(c.eng);
            } else if (SENSOR_WEIGHTS[c.eng]) c.weight = SENSOR_WEIGHTS[c.eng];
            else c.weight = 100;
        });

        chConfig.sort((a, b) => b.weight - a.weight);
        renderSidebar();
        rebuildAllCharts();
        if (window.innerWidth <= 768) toggleMobileSidebar(false); // 手機載入後自動收起側欄
    }

    // --- 渲染側邊欄 ---
    function renderSidebar() {
        const list = document.getElementById('sidebarItems');
        document.getElementById('chartCount').innerText = `${activeCharts.length}/${MAX_CHARTS}`;
        list.innerHTML = '';
        domCache = {}; // 清空快取
        
        chConfig.forEach(c => {
            if (c.eng === 'Time') return;
            const active = activeCharts.includes(c.eng);
            const row = document.createElement('div');
            row.className = `ch-row ${active ? 'active' : ''} ${c.isFault ? 'fault-row' : ''}`;
            
            const mainName = c.chn ? c.chn : c.eng;
            const subName = c.chn ? c.eng : '';
            const valColor = c.isFault ? 'var(--error)' : 'var(--highlight)';
            const safeId = `side-val-${c.eng.replace(/[^a-zA-Z0-9]/g, '_')}`;

            row.innerHTML = `
                <input type="checkbox" ${active ? 'checked' : ''} onchange="toggleChart('${c.eng}')">
                <div class="ch-info" title="${c.eng} - ${c.chn}">
                    <div class="ch-chn">${mainName} ${c.triggered ? '<b style="color:var(--error); font-size:11px;">[FAULT]</b>' : ''}</div>
                    <div class="ch-eng">${subName}</div>
                </div>
                <div class="ch-val" id="${safeId}" style="color: ${valColor}">--</div>
            `;
            row.onclick = (e) => { if(e.target.tagName !== 'INPUT') toggleChart(c.eng); };
            list.appendChild(row);
            
            // 將數值標籤存入快取，提升 hover 效能
            domCache[c.eng] = document.getElementById(safeId);
        });
    }

    function toggleChart(eng) {
        if (activeCharts.includes(eng)) {
            activeCharts = activeCharts.filter(a => a !== eng);
        } else {
            if (activeCharts.length >= MAX_CHARTS) {
                alert(`為了確保分析效能與畫面可讀性，最多只能同時對比 ${MAX_CHARTS} 個感測器。`);
                renderSidebar(); return;
            }
            activeCharts.push(eng);
        }
        renderSidebar(); rebuildAllCharts();
    }

    // --- 重繪圖表區 ---
    function rebuildAllCharts() {
        // 保存現有高度
        activeCharts.forEach(eng => {
            const el = document.getElementById(`chart-${eng.replace(/[^a-zA-Z0-9]/g, '_')}`);
            if (el) savedHeights[eng] = el.style.height;
        });

        chartHeightObserver.disconnect();
        const overlays = Array.from(chartContainer.children).filter(child => child.id === 'drop-overlay');
        chartContainer.innerHTML = '';
        overlays.forEach(o => chartContainer.appendChild(o));

        if (activeCharts.length === 0) {
            tooltip.style.display = 'none';
            return;
        }

        const theme = getThemeColors();

        activeCharts.forEach((eng, idx) => {
            const div = document.createElement('div');
            div.className = 'chart-card'; 
            const safeEng = eng.replace(/[^a-zA-Z0-9]/g, '_');
            div.id = `chart-${safeEng}`;
            
            if (savedHeights[safeEng]) div.style.height = savedHeights[safeEng];
            
            chartContainer.appendChild(div);
            chartHeightObserver.observe(div);

            // 建立高度控制按鈕 (單擊自動縮合)
            const controls = document.createElement('div');
            controls.className = 'chart-controls';
            controls.innerHTML = `<button class="btn-chart-resize" title="點擊縮至最小 / 恢復" style="display:flex;align-items:center;justify-content:center;"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M8 3v4m0 0H4m4 0L3 3M16 21v-4m0 0h4m-4 0l5 5"/></svg></button>`;
            
            controls.querySelector('.btn-chart-resize').addEventListener('click', (e) => {
                e.stopPropagation(); 
                const currentHeight = parseInt(window.getComputedStyle(div).height);
                const defaultHeight = window.innerWidth <= 768 ? '200px' : '260px'; // 手機與電腦的預設高度差異
                
                if (currentHeight > 155) {
                    div.style.height = '150px';
                } else {
                    div.style.height = defaultHeight; 
                }
                savedHeights[safeEng] = div.style.height;
                setTimeout(() => Plotly.Plots.resize(div), 260); // 配合 CSS transition 等待重繪
            });
            div.appendChild(controls);

            const cInfo = chConfig.find(item => item.eng === eng);
            const isF = cInfo.isFault;
            
            const layout = {
                paper_bgcolor: theme.bg, plot_bgcolor: theme.bg,
                margin: { t: 35, b: 30, l: 60, r: 20 },
                title: { text: cInfo.chn || cInfo.eng, font: { size: 12, color: isF ? '#ef4444' : theme.text }, x: 0 },
                xaxis: { range: currentXRange, gridcolor: theme.grid, color: theme.text, showspikes: true, spikemode: 'across', spikedash: 'solid', spikecolor: theme.text },
                yaxis: { gridcolor: theme.grid, color: theme.text, autorange: true, zeroline: false },
                hovermode: 'x'
            };

            Plotly.newPlot(div.id, [{
                x: timeAxis, y: db[eng], type: 'scattergl', mode: 'lines',
                line: { width: 1.5, color: isF ? '#ef4444' : getProColor(idx), shape: isF ? 'hv' : 'linear' }, hoverinfo: 'none'
            }], layout, { responsive: true, scrollZoom: true, displaylogo: false });

            div.on('plotly_relayout', (data) => {
                if (isSyncing) return;
                isSyncing = true;
                if (data['xaxis.range[0]']) {
                    currentXRange = [data['xaxis.range[0]'], data['xaxis.range[1]']];
                    applySync();
                }
                isSyncing = false;
            });
            
            // 使用 requestAnimationFrame 節流提升 hover 效能
            div.on('plotly_hover', (data) => {
                if (rafId) cancelAnimationFrame(rafId);
                rafId = requestAnimationFrame(() => updateAllValues(data.points[0].pointIndex, data.points[0].x, data.event));
            });
        });
        applySync();
    }

    // --- 全通道同步連動 (效能優化版) ---
    function updateAllValues(idx, x, event) {
        if (activeCharts.length === 0) return;

        // 1. 同步圖表游標
        activeCharts.forEach(id => {
            const divId = `chart-${id.replace(/[^a-zA-Z0-9]/g, '_')}`;
            if(document.getElementById(divId)) Plotly.Fx.hover(divId, { xval: x });
        });

        // 2. 更新側邊欄數值 (使用 DOM 快取)
        chConfig.forEach(c => {
            const valEl = domCache[c.eng]; // 直接從快取取用，不耗費查詢資源
            if (valEl) {
                const val = db[c.eng][idx];
                if (typeof val === 'number') {
                    valEl.innerText = c.isFault ? val.toFixed(0) : val.toFixed(2);
                    valEl.style.color = c.isFault ? 'var(--error)' : 'var(--highlight)';
                } else { valEl.innerText = '--'; }
            }
        });

        // 3. 構建並顯示浮動窗
        let html = `<div style="color:#94a3b8; border-bottom:1px solid #334155; margin-bottom:8px; padding-bottom:4px; font-family:'Fira Code',Consolas,monospace;">TIME: ${x.toFixed(3)}s</div>`;
        activeCharts.forEach(id => {
            const val = db[id][idx];
            const cInfo = chConfig.find(item => item.eng === id);
            const displayVal = cInfo.isFault ? val.toFixed(0) : val.toFixed(2);
            const valColor = cInfo.isFault ? '#ef4444' : '#10b981';
            
            html += `<div style="display:flex; justify-content:space-between; gap:25px; margin-bottom:4px; font-size:13px;">
                <span style="color:#e2e8f0">${cInfo.chn || cInfo.eng}</span>
                <span style="color:${valColor}; font-family:'Fira Code',Consolas,monospace; font-weight:bold;">${displayVal}</span>
            </div>`;
        });
        
        tooltip.innerHTML = html;
        tooltip.style.display = 'block';
        
        // 防溢出邏輯
        const tooltipRect = tooltip.getBoundingClientRect();
        let posX = event.clientX + 15;
        let posY = event.clientY + 15;

        if (posX + tooltipRect.width > window.innerWidth) posX = event.clientX - tooltipRect.width - 15;
        if (posY + tooltipRect.height > window.innerHeight) posY = event.clientY - tooltipRect.height - 15;

        tooltip.style.left = posX + 'px';
        tooltip.style.top = posY + 'px';
    }

    function applySync() {
        if (activeCharts.length === 0) return;
        const startT = currentXRange[0], endT = currentXRange[1];
        const sIdx = Math.max(0, timeAxis.findIndex(t => t >= startT));
        const eIdx = Math.max(0, timeAxis.findLastIndex(t => t <= endT));

        activeCharts.forEach(id => {
            const slice = db[id].slice(sIdx, eIdx + 1);
            if (slice.length > 0) {
                const min = Math.min(...slice), max = Math.max(...slice);
                const pad = (max === min) ? 1 : (max - min) * 0.15;
                const divId = `chart-${id.replace(/[^a-zA-Z0-9]/g, '_')}`;
                Plotly.relayout(divId, { 'xaxis.range': currentXRange, 'yaxis.range': [min - pad, max + pad] });
            }
        });
    }

    function getProColor(i) { return ['#10b981', '#3b82f6', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#f8fafc'][i % 7]; }
</script>
